<!DOCTYPE html>
<!-- Deployed via Vercel + GitHub auto-deploy -->
<!-- 22.6.2026 -->
<html lang="he" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>איתן ברון — קורות חיים</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --navy: #022159;
      --navy2: #0f3a73;
      --blue: #2b5aa0;
      --rail: #b9c6dd;
      --pill-bg: #eef2f8;
      --pill-border: #c3d0e6;
      --ink: #2a2f3a;
      --muted: #465168;
      --line: #022159;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      background: #5b6578;
      font-family: 'Heebo', Arial, sans-serif;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      padding: 24px 12px 60px;
    }

    /* Toolbar (not exported) - Swiss/Modern editorial style */
    .toolbar {
      max-width: 794px;
      margin: 0 auto 24px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .toolbar button {
      font-family: 'Heebo', Arial, sans-serif;
      font-size: 13px;
      font-weight: 800;
      border: 1.5px solid #1a1a1a;
      border-radius: 0 !important;
      padding: 10px 20px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all .15s ease;
      background: #1a1a1a;
      color: #ffffff;
      box-shadow: none;
    }

    .toolbar button svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .btn-png, .btn-pdf, .btn-word {
      background: #1a1a1a;
      color: #ffffff;
      border: 1.5px solid #1a1a1a;
    }

    .toolbar button:hover:not(:disabled) {
      background: #e07631;
      border-color: #e07631;
      color: #ffffff;
      transform: translateY(-1px);
    }

    .toolbar button:active:not(:disabled) {
      transform: translateY(1px);
    }

    .toolbar button:disabled {
      opacity: .55;
      cursor: wait;
      transform: none;
    }

    /* Language and View switches (not exported) */
    .lang-switch {
      max-width: 794px;
      margin: 0 auto 12px;
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .lang-btn {
      font-family: 'Heebo', Arial, sans-serif;
      font-size: 12px;
      font-weight: 800;
      border: 1.5px solid #1a1a1a;
      background: #faf9f6;
      color: #1a1a1a;
      padding: 6px 18px;
      cursor: pointer;
      transition: all .15s ease;
      border-radius: 0 !important;
    }

    .lang-btn:hover {
      background: #e07631;
      border-color: #e07631;
      color: #ffffff;
    }

    .lang-btn.active {
      background: #1a1a1a;
      color: #ffffff;
      border-color: #1a1a1a;
    }

    .lang-btn.active:hover {
      background: #e07631;
      border-color: #e07631;
      color: #ffffff;
    }

    #doc {
      display: block;
    }

    #stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 26px;
    }

    .page {
      width: 794px;
      max-width: 100%;
      min-height: 1123px;
      background: #fff;
      position: relative;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(0, 0, 0, .35);
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      padding: 30px 34px;
      background-color: #fff2e3;
      border-bottom: 1px solid #022159;
    }

    .header-top {
      display: flex;
      align-items: stretch;
      gap: 18px;
    }

    .name-block {
      flex: 1;
      text-align: right;
      padding-bottom: 2px;
    }

    .name {
      font-size: 23px;
      font-weight: 800;
      color: var(--navy2);
      line-height: 1;
      letter-spacing: 0.5px;
      margin: 0px 0px 5px 0px;
    }

    .subtitle {
      margin-top: 5px;
      font-size: 15px;
      font-weight: 600;
      color: var(--navy);
      direction: ltr;
      display: inline-block;
    }

    .subtitle .role {
      color: #3a4a66;
    }

    .photo-wrap {
      flex: 0 0 auto;
      width: 105px;
      align-self: stretch;
      border-radius: 11px;
      border: 2px solid var(--navy);
      padding: 0;
      background: #fff;
      box-shadow: 0 4px 14px rgba(2, 33, 89, .25);
      overflow: hidden;
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 9px;
      display: block;
    }

    .contact {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      flex-wrap: wrap;
      gap: 0;
      font-size: 14px;
      color: var(--navy);
      font-weight: 500;
      margin-top: 10px;
    }

    .contact .item {
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .contact .item svg {
      width: 16px;
      height: 16px;
      fill: var(--navy);
      flex: 0 0 auto;
    }

    .contact .sep {
      width: 1px;
      height: 15px;
      background: #9aa7c2;
      margin: 0 13px;
    }

    .contact .mail {
      direction: ltr;
    }

    .personal {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      flex-wrap: wrap;
      gap: 0;
      font-size: 12.7px;
      color: var(--navy);
      margin-top: 10px;
    }

    .personal .item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .personal .item svg {
      width: 14px;
      height: 14px;
      fill: var(--navy);
      flex: 0 0 auto;
    }

    .personal .sep {
      width: 1px;
      height: 13px;
      background: #aab4c9;
      margin: 0 12px;
    }

    .header-bottom-rule {
      /* height: 1px; */
      background: var(--navy);
      margin: 20px 0 0;
    }

    /* Sections */
    .section {
      padding: 13px 34px 16px 34px;
    }

    .sec-head {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 11px;
      margin-bottom: 11px;
    }

    .sec-divider {
      height: 1px;
      background: var(--navy);
      margin: 1px 34px;
      border-radius: 2px;
    }

    .sec-icon {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--navy);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .sec-icon svg {
      width: 17px;
      height: 17px;
      fill: #fff;
    }

    .sec-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--navy);
    }

    .sec-title .cont {
      font-size: 13px;
      font-weight: 600;
      color: #6a7790;
    }

    .summary {
      font-size: 13px;
      line-height: 1.62;
      color: #33394a;
      text-align: justify;
      margin: 0px;
    }

    /* Professional knowledge */
    .know-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 9px;
    }

    .know-label {
      flex: 0 0 96px;
      font-size: 12px;
      font-weight: 600;
      color: var(--navy);
      padding-top: 3px;
    }

    .know-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      flex: 1;
    }

    .skill {
      border: 1.5px solid var(--pill-border);
      background: var(--pill-bg);
      color: var(--navy);
      font-weight: 600;
      font-size: 11.3px;
      padding: 3px 8px;
      border-radius: 6px;
      direction: ltr;
      white-space: nowrap;
    }

    .know-note {
      font-size: 12.7px;
      color: #3a4150;
      margin-top: 3px;
    }

    .know-note b {
      color: var(--navy);
    }

    /* Experience */
    .experience {
      position: relative;
      padding-left: 27px;
    }

    .experience::before {
      content: "";
      position: absolute;
      top: 9px;
      bottom: 10px;
      right: 95px;
      width: 2.5px;
      background: var(--rail);
      border-radius: 2px;
    }

    .exp-item {
      position: relative;
      padding-right: 126px;
      margin-bottom: 12px;
    }

    .exp-item:last-child {
      margin-bottom: 4px;
    }

    .exp-year {
      position: absolute;
      right: 0;
      top: 5px;
      height: 14px;
      width: 82px;
      text-align: left;
      font-size: 13.5px;
      font-weight: 800;
      color: var(--navy);
      direction: ltr;
      line-height: 14px;
      white-space: nowrap;
    }

    .exp-dot {
      position: absolute;
      right: 89px;
      top: 5px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--navy);
      border: 3px solid #fff;
      box-shadow: 0 0 0 2px var(--rail);
    }

    .exp-company {
      font-size: 15px;
      font-weight: 800;
      color: #16243f;
      margin-bottom: 2px;
      direction: rtl;
    }

    .exp-company .en {
      direction: ltr;
      display: inline-block;
    }

    .exp-desc {
      font-size: 12.3px;
      color: #6a7286;
      margin-bottom: 4px;
      font-style: italic;
    }

    .exp-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .exp-list li {
      position: relative;
      padding-right: 16px;
      margin-bottom: 2px;
      font-size: 13px;
      line-height: 1.4;
      color: #3a4150;
    }

    .exp-list li::before {
      content: "";
      position: absolute;
      right: 0;
      top: 7px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--navy);
    }

    .exp-project-title {
      font-weight: 600;
      color: #3a4150;
    }

    .exp-project-list {
      margin: 3px 0 1px;
      padding: 0;
      list-style: none;
    }

    .exp-project-list li {
      padding-right: 13px;
      margin-bottom: 2px;
      font-size: 12.8px;
      line-height: 1.35;
    }

    .exp-project-list li::before {
      right: 1px;
      top: 7px;
      width: 4px;
      height: 4px;
      background: var(--rail);
    }

    .exp-list li .en {
      direction: ltr;
      unicode-bidi: isolate;
    }

    .ltr {
      direction: ltr;
      unicode-bidi: isolate;
    }

    /* Bottom columns */
    .bottom-divider {
      height: 2px;
      background: var(--navy);
      margin: 9px 34px;
      border-radius: 2px;
    }

    .two-col {
      display: flex;
      gap: 0;
      padding: 9px 34px;
      align-items: stretch;
    }

    .two-col .col {
      flex: 1;
      padding: 0 18px;
    }

    .two-col .col:first-child {
      padding-right: 0;
    }

    .two-col .col:last-child {
      padding-left: 0;
    }

    .two-col .sec-head {
      margin-bottom: 11px;
    }

    .vdivider {
      width: 1px;
      background: var(--navy);
      align-self: stretch;
      margin: 4px 0;
      flex: 0 0 auto;
      border-radius: 2px;
    }

    .edu-timeline {
      position: relative;
    }

    .edu-timeline::before {
      content: "";
      position: absolute;
      top: 9px;
      bottom: 10px;
      right: 95px;
      width: 2.5px;
      background: var(--rail);
      border-radius: 2px;
    }

    html.exporting-shot .experience::before,
    html.exporting-shot .edu-timeline::before {
      content: none !important;
      display: none !important;
      opacity: 0 !important;
      background: transparent !important;
    }

    .edu-item {
      position: relative;
      padding-right: 126px;
      margin-bottom: 11px;
    }

    .edu-item:last-child {
      margin-bottom: 2px;
    }

    .edu-dot {
      position: absolute;
      right: 89px;
      top: 5px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--navy);
      border: 3px solid #fff;
      box-shadow: 0 0 0 2px var(--rail);
    }

    .edu-text {
      min-width: 0;
    }

    .edu-title {
      font-size: 14px;
      font-weight: 700;
      color: #16243f;
    }

    .edu-sub {
      font-size: 12.5px;
      color: #56607a;
      margin-top: 1px;
      line-height: 1.4;
    }

    .edu-note {
      font-size: 11.8px;
      color: #6a7488;
      margin-top: 1px;
      line-height: 1.35;
    }

    .edu-year {
      position: absolute;
      right: 0;
      top: 5px;
      height: 14px;
      width: 82px;
      text-align: left;
      font-size: 13.5px;
      font-weight: 800;
      color: var(--navy);
      direction: ltr;
      line-height: 14px;
      white-space: nowrap;
    }

    .lang-item {
      font-size: 13.3px;
      color: #33394a;
      margin-bottom: 6px;
      display: flex;
      align-items: flex-start;
      gap: 9px;
      line-height: 1.35;
    }

    .lang-item::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--navy);
      flex: 0 0 auto;
      margin-top: 5px;
    }

    .lang-item b {
      font-weight: 700;
      color: #16243f;
    }

    .spacer {
      flex: 1;
    }

    .footer {
      background: var(--navy);
      color: #eef2fb;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 11px 20px;
      font-size: 13.5px;
      font-weight: 600;
    }

    .footer svg {
      width: 20px;
      height: 20px;
      fill: #cfe0ff;
      flex: 0 0 auto;
    }

    .page-num {
      position: absolute;
      bottom: 6px;
      left: 14px;
      font-size: 11px;
      color: #9aa7c2;
      font-weight: 600;
      direction: ltr;
    }

    @media (max-width:560px) {
      .name {
        font-size: 30px;
      }

      .page {
        width: 100%;
      }
    }

    /* English (LTR) — mirror direction-sensitive layout */
    [dir="ltr"] .name-block {
      text-align: left;
    }

    [dir="ltr"] .exp-company {
      direction: ltr;
      text-align: left;
    }

    /* Two-column block: keep the breathing room next to the center divider */
    [dir="ltr"] .two-col .col:first-child {
      padding-left: 0;
      padding-right: 18px;
    }

    [dir="ltr"] .two-col .col:last-child {
      padding-right: 0;
      padding-left: 18px;
    }

    [dir="ltr"] .experience,
    [dir="ltr"] .edu-timeline {
      padding-left: 0;
      padding-right: 27px;
    }

    [dir="ltr"] .experience::before,
    [dir="ltr"] .edu-timeline::before {
      right: auto;
      left: 95px;
    }

    [dir="ltr"] .exp-item,
    [dir="ltr"] .edu-item {
      padding-right: 0;
      padding-left: 126px;
    }

    [dir="ltr"] .exp-year,
    [dir="ltr"] .edu-year {
      right: auto;
      left: 0;
      text-align: right;
    }

    [dir="ltr"] .exp-dot,
    [dir="ltr"] .edu-dot {
      right: auto;
      left: 89px;
    }

    [dir="ltr"] .exp-list li {
      padding-right: 0;
      padding-left: 16px;
    }

    [dir="ltr"] .exp-list li::before {
      right: auto;
      left: 0;
    }

    [dir="ltr"] .page-num {
      left: auto;
      right: 14px;
    }

    /* ---- Wide view: pages side by side, fit to screen, language-ordered ---- */
    body.wide {
      overflow: hidden;
    }

    #doc.wide {
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #doc.wide #stage {
      flex-direction: row;
      align-items: flex-start;
      justify-content: center;
      gap: 30px;
      transform: scale(var(--wide-scale, 1));
      transform-origin: center center;
      flex: 0 0 auto;
    }

    #doc.wide #stage .page {
      cursor: zoom-in;
      flex: 0 0 auto;
      box-shadow: 0 14px 50px rgba(0, 0, 0, .45);
      transition: outline-color .12s;
      outline: 3px solid transparent;
    }

    #doc.wide #stage .page:hover {
      outline-color: #ffffff;
    }

    /* ---- Fullscreen single-page viewer ---- */
    #fsOverlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(20, 24, 33, .94);
      align-items: stretch;
      justify-content: center;
    }

    #fsScroll {
      flex: 1 1 auto;
      overflow: auto;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 0 60px;
    }

    #fsPage .page {
      box-shadow: 0 16px 60px rgba(0, 0, 0, .5);
      cursor: default;
    }

    .fs-arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 60px;
      height: 90px;
      border: none;
      border-radius: 12px;
      background: rgba(255, 255, 255, .14);
      color: #fff;
      font-size: 46px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .12s;
      z-index: 1002;
      font-family: Arial, sans-serif;
    }

    .fs-arrow:hover {
      background: rgba(255, 255, 255, .3);
    }

    .fs-left {
      left: 18px;
    }

    .fs-right {
      right: 18px;
    }

    .fs-close {
      position: fixed;
      top: 16px;
      right: 20px;
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, .14);
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      z-index: 1002;
      transition: background .12s;
    }

    .fs-close:hover {
      background: rgba(255, 255, 255, .3);
    }
  </style>
</head>

<body>

  <div class="lang-switch">
    <button id="langHe" class="lang-btn active" onclick="setLang('he')">עברית</button>
    <button id="langEn" class="lang-btn" onclick="setLang('en')">English</button>
  </div>

  <div class="lang-switch">
    <button id="viewNormal" class="lang-btn active" onclick="setView('normal')" data-en="Normal view">תצוגה רגילה</button>
    <button id="viewWide" class="lang-btn" onclick="setView('wide')" data-en="Wide view">תצוגה רחבה</button>
  </div>

  <div class="toolbar">
    <button class="btn-png" id="btnPng" onclick="exportPNG()">
      <svg viewBox="0 0 24 24">
        <path
          d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z" />
      </svg>
      <span data-en="Export as Image (PNG)">ייצוא כתמונה (PNG)</span>
    </button>
    <button class="btn-pdf" id="btnPdf" onclick="exportPDF()">
      <svg viewBox="0 0 24 24">
        <path
          d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-8.5 7.5c0 .83-.67 1.5-1.5 1.5H7.5v2H6V7h3c.83 0 1.5.67 1.5 1.5v2zm5 2c0 .83-.67 1.5-1.5 1.5h-3V7h3c.83 0 1.5.67 1.5 1.5v5zm4-5.5H18v1h1.5V13H18v3h-1.5V7H20v1z" />
      </svg>
      <span data-en="Export as PDF (2 pages)">ייצוא כ-PDF (2 עמודים)</span>
    </button>
    <button class="btn-word" id="btnWord" onclick="exportWord()">
      <svg viewBox="0 0 24 24">
        <path
          d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zM6 20V4h5v7h7v9H6z" />
      </svg>
      <span data-en="Export as Word">ייצוא כ-Word</span>
    </button>
  </div>

  <div id="doc">
    <div id="stage">

      <!-- ===================== PAGE 1 ===================== -->
      <div class="page" id="page1">

        <div class="header">
          <div class="header-top">
            <div class="name-block">
              <h1 class="name" data-en="Eitan Baron">איתן ברון</h1>
              <div class="subtitle"><span class="ltr">Java / J2EE · ASP.NET C# · Vue.js 2.0 · .NET Core 3.1</span> <span
                  class="role" data-en="| Software Developer">| מפתח תוכנה</span></div>
              <div class="contact">
                <span class="item"><svg viewBox="0 0 24 24">
                    <path
                      d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z" />

    async function exportPDF() {
      busy(true);
      try {
        const pages = [...document.querySelectorAll('#stage .page')];
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const pw = pdf.internal.pageSize.getWidth(), ph = pdf.internal.pageSize.getHeight();
        for (let i = 0; i < pages.length; i++) {
          const canvas = await shot(pages[i]);
          const img = canvas.toDataURL('image/jpeg', 0.95);
          // Each .page is designed at exact A4 proportions, so fill the whole
          // sheet edge-to-edge. This prevents thin white side margins that
          // appear (most visibly next to the cream header) when a page's
          // content makes it a touch taller than A4's aspect ratio.
          if (i > 0) pdf.addPage();
          pdf.addImage(img, 'JPEG', 0, 0, pw, ph);
        }
        pdf.save(window.__lang === 'en' ? 'Eitan_Baron_Resume.pdf' : 'איתן_ברון_קורות_חיים.pdf');
      } catch (e) { alert('שגיאה בייצוא ה-PDF: ' + e.message); }
      busy(false);
    }
    async function exportWord() {
      busy(true);
      try {
        const D = docx;
        const docRtl = window.__lang !== 'en';
        const navy = '022159';
        const f = 'Heebo';
        const rtlTextAlign = D.AlignmentType.START;
        const twoColDividerPadding = 280;
        function gt(el) { return el ? el.textContent.trim().replace(/\s+/g, ' ') : ''; }

        function base64ToUint8Array(base64) {
          const raw = window.atob(base64.split(',')[1]);
          const rawLength = raw.length;
          const array = new Uint8Array(new ArrayBuffer(rawLength));
          for (let i = 0; i < rawLength; i++) {
            array[i] = raw.charCodeAt(i);
          }
          return array;
        }

        function mkSecHead(text) {
          return new D.Paragraph({
            alignment: rtlTextAlign,
            bidirectional: docRtl,
            spacing: { before: 200, after: 100 },
            border: { bottom: { style: D.BorderStyle.SINGLE, size: 6, color: navy, space: 4 } },
            children: [new D.TextRun({ text: text, bold: true, size: 26, color: navy, font: f, rightToLeft: docRtl })]
          });
        }

        function mkRule() {
          return new D.Paragraph({
            spacing: { before: 60, after: 60 },
            border: { bottom: { style: D.BorderStyle.SINGLE, size: 4, color: navy, space: 1 } },
            children: []
          });
        }

        const photoEl = document.querySelector('.photo-wrap img');
        const photoSrc = photoEl ? photoEl.getAttribute('src') : '';

        const contactRuns = [];
        const contactItems = [...document.querySelectorAll('.contact .item')];
        contactItems.forEach((item, index) => {
          const isEmail = item.querySelector('.mail') !== null;
          const isPhone = !isEmail && item.querySelector('.ltr') !== null;
          contactRuns.push(new D.TextRun({
            text: gt(item),
            size: 20,
            color: '1f2a44',
            font: f,
            rightToLeft: !(isEmail || isPhone)
          }));
          if (index < contactItems.length - 1) {
            contactRuns.push(new D.TextRun({
              text: '   |   ',
              size: 20,
              color: '9aa7c2',

                    children: [

                  });
                }

                processCol(cols[0], rightColChildren);
                processCol(cols[1], leftColChildren);

                c.push(new D.Table({
                  visuallyRightToLeft: true,
                  columnWidths: [5103, 5103],
                  width: { size: 10206, type: D.WidthType.DXA },
                  borders: {
                    top: { style: D.BorderStyle.NONE },
                    bottom: { style: D.BorderStyle.NONE },
                    left: { style: D.BorderStyle.NONE },
                    right: { style: D.BorderStyle.NONE },
                    insideHorizontal: { style: D.BorderStyle.NONE },
                    insideVertical: { style: D.BorderStyle.SINGLE, size: 12, color: navy }
                  },
                  rows: [
                    new D.TableRow({
                      children: [
                        new D.TableCell({
                          width: { size: 5103, type: D.WidthType.DXA },
                          margins: { marginUnitType: D.WidthType.DXA, left: twoColDividerPadding, right: 0 },
                          borders: {
                            top: { style: D.BorderStyle.NONE },
                            bottom: { style: D.BorderStyle.NONE },
                            left: { style: D.BorderStyle.NONE },
                            right: { style: D.BorderStyle.NONE }
                          },
                          children: rightColChildren
                        }),
                        new D.TableCell({
                          width: { size: 5103, type: D.WidthType.DXA },
                          margins: { marginUnitType: D.WidthType.DXA, left: 0, right: twoColDividerPadding },
                          borders: {
                            top: { style: D.BorderStyle.NONE },
                            bottom: { style: D.BorderStyle.NONE },
                            left: { style: D.BorderStyle.NONE },
                            right: { style: D.BorderStyle.NONE }
                          },
                          children: leftColChildren
                        })
                      ]
                    })
                  ]
                }));
              }
              return;
            }

            const titleEl = el.querySelector('.sec-title');
            if (!titleEl) return;
            c.push(mkSecHead(gt(titleEl)));

            const summary = el.querySelector('.summary');
            if (summary) {
              c.push(new D.Paragraph({
                alignment: rtlTextAlign,
                bidirectional: docRtl,
                spacing: { after: 80 },
                children: [new D.TextRun({ text: gt(summary), size: 20, color: '33394a', font: f, rightToLeft: docRtl, rtl: docRtl })]
              }));
            }

            el.querySelectorAll('.know-row').forEach(row => {
              const label = gt(row.querySelector('.know-label'));
              const skills = [...row.querySelectorAll('.skill')].map(s => gt(s)).join(' \u00B7 ');
              c.push(new D.Paragraph({
                alignment: rtlTextAlign,
                bidirectional: docRtl,
                spacing: { after: 60 },
                children: [
                  new D.TextRun({ text: label + ':  ', bold: true, size: 19, color: navy, font: f, rightToLeft: docRtl, rtl: docRtl }),
                  new D.TextRun({ text: skills, size: 19, color: '2b5aa0', font: f })
                ]
              }));
            });

            el.querySelectorAll('.exp-item').forEach(item => {
              const yr = gt(item.querySelector('.exp-year'));
              const co = gt(item.querySelector('.exp-company'));
              const desc = item.querySelector('.exp-desc');

              c.push(new D.Paragraph({
                alignment: rtlTextAlign,
                bidirectional: docRtl,
                spacing: { before: 100, after: 40 },
                children: [
                  new D.TextRun({ text: co, bold: true, size: 22, color: '16243f', font: f, rightToLeft: docRtl, rtl: docRtl }),
                  new D.TextRun({ text: '    ' + yr, bold: true, size: 20, color: navy, font: f })
                ]
              }));

              if (desc) {
                c.push(new D.Paragraph({
                  alignment: rtlTextAlign,
                  bidirectional: docRtl,
                  spacing: { after: 40 },
                  children: [new D.TextRun({ text: gt(desc), size: 18, color: '6a7286', font: f, italics: true, rightToLeft: docRtl, rtl: docRtl })]
                }));
              }

              // Text of a <li> excluding any nested list (so the parent bullet
              // doesn't swallow its sub-items). Uses gt() for identical text.
              const liOwnText = (li) => {
                const clone = li.cloneNode(true);
                clone.querySelectorAll('ul, ol').forEach(u => u.remove());
                return gt(clone);
              };
              const bulletPara = (text, indent, marker) => new D.Paragraph({
                alignment: rtlTextAlign,
                bidirectional: docRtl,
                spacing: { after: 20 },
                indent,
                children: [
                  new D.TextRun({ text: (docRtl ? '\u200F' : '') + marker + ' ', size: 19, color: navy, font: f, rightToLeft: docRtl, rtl: docRtl }),
                  new D.TextRun({ text: text, size: 19, color: '3a4150', font: f, rightToLeft: docRtl, rtl: docRtl })
                ]
              });
              // Top-level bullets only; nested project lists become sub-bullets,
              // so all text appears exactly once and matches the on-screen text.
              item.querySelectorAll(':scope > .exp-list > li').forEach(li => {
                c.push(bulletPara(liOwnText(li), docRtl ? { right: 240 } : { left: 240 }, '\u2022'));
                li.querySelectorAll(':scope > ul > li').forEach(sub => {
                  c.push(bulletPara(gt(sub), docRtl ? { right: 540 } : { left: 540 }, '\u25E6'));
                });
              });
            });

            if (!el.closest('.two-col')) {
              el.querySelectorAll('.edu-item').forEach(item => {
                const yr = gt(item.querySelector('.edu-year'));
                const ti = gt(item.querySelector('.edu-title'));
                const sub = item.querySelector('.edu-sub');
                const note = item.querySelector('.edu-note');

                c.push(new D.Paragraph({
                  alignment: rtlTextAlign,
                  bidirectional: docRtl,
                  spacing: { before: 80, after: 30 },
                  children: [
                    new D.TextRun({ text: ti, bold: true, size: 21, color: '16243f', font: f, rightToLeft: docRtl, rtl: docRtl }),
                    new D.TextRun({ text: '    ' + yr, bold: true, size: 20, color: navy, font: f })
                  ]
                }));

                if (sub) {
                  c.push(new D.Paragraph({
                    alignment: rtlTextAlign,
                    bidirectional: docRtl,
                    spacing: { after: 20 },
                    children: [new D.TextRun({ text: gt(sub), size: 18, color: '56607a', font: f, rightToLeft: docRtl, rtl: docRtl })]
                  }));
                }

                if (note) {
                  c.push(new D.Paragraph({
                    alignment: rtlTextAlign,
                    bidirectional: docRtl,
                    spacing: { after: 40 },
                    children: [new D.TextRun({ text: gt(note), size: 17, color: '6a7488', font: f, rightToLeft: docRtl, rtl: docRtl })]
                  }));
                }
              });
            }

            // lang-item rows inside a regular section (e.g. References)
            el.querySelectorAll('.lang-item').forEach(li => {
              c.push(new D.Paragraph({
                alignment: rtlTextAlign,
                bidirectional: docRtl,
                spacing: { after: 40 },
                children: [
                  new D.TextRun({ text: docRtl ? '‏• ' : '• ', size: 20, color: navy, font: f, rightToLeft: docRtl, rtl: docRtl }),
                  new D.TextRun({ text: gt(li), size: 20, color: '33394a', font: f, rightToLeft: docRtl, rtl: docRtl })
                ]
              }));
            });

            const knowNote = el.querySelector('.know-note');
            if (knowNote) {
              c.push(new D.Paragraph({
                alignment: rtlTextAlign,
                bidirectional: docRtl,
                spacing: { after: 80 },
                children: [new D.TextRun({ text: gt(knowNote), size: 18, color: '3a4150', font: f, rightToLeft: docRtl, rtl: docRtl })]
              }));
            }
          });

          const footerEl = page.querySelector('.footer');
          if (footerEl) {
            c.push(mkRule());
            c.push(new D.Paragraph({
              alignment: rtlTextAlign,
              bidirectional: docRtl,
              spacing: { before: 80 },
              shading: { type: D.ShadingType.SOLID, color: navy, fill: navy },
              children: [new D.TextRun({ text: '  ' + gt(footerEl) + '  ', bold: true, size: 20, color: 'eef2fb', font: f, rightToLeft: docRtl, rtl: docRtl })]
            }));
          }

          const pageNumEl = page.querySelector('.page-num');
          if (pageNumEl) {
            c.push(new D.Paragraph({
              alignment: rtlTextAlign,
              bidirectional: docRtl,
              spacing: { before: 100 },
              children: [new D.TextRun({ text: gt(pageNumEl), size: 16, color: '9aa7c2', font: f, rightToLeft: docRtl, rtl: docRtl })]
            }));
          }

          sections.push({
            properties: {
              page: {
                size: { width: 11906, height: 16838 },
                margin: { top: 720, right: 850, bottom: 720, left: 850 }
              },
              bidi: docRtl
            },
            children: c
          });
        });

        const wordDoc = new D.Document({
          styles: {
            default: {
              document: {
                run: {
                  font: f,
                  rightToLeft: docRtl
                },
                paragraph: {
                  spacing: { line: 240 },
                  bidirectional: docRtl,
                  alignment: rtlTextAlign
                }
              }
            }
          },
          sections: sections
        });

        const wordBlob = await D.Packer.toBlob(wordDoc);
        const url = URL.createObjectURL(wordBlob);
        const link = document.createElement('a');
        link.href = url;
        link.download = (window.__lang === 'en' ? 'Eitan_Baron_Resume.docx' : 'איתן_ברון_קורות_חיים.docx');
        link.click();
        URL.revokeObjectURL(url);
      } catch (e) {
        alert('שגיאה בייצוא ל-Word: ' + e.message);
      }
      busy(false);
    }
  </script>
</body>

</html>
